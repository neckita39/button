<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
<title>Живой офис</title>
<style>
  :root {
    --bg0: #0b0d13; --bg1: #131722;
    --panel: rgba(17, 20, 30, .92); --line: #262b3d;
    --text: #e8ebf5; --dim: #8b93ab;
    --amber: #f5a623; --free: #35c56d; --busy: #5b8def; --warm: #ffb648;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 90% at 50% 0%, var(--bg1), var(--bg0) 70%);
    color: var(--text); overflow: hidden;
    font: 15px/1.45 -apple-system, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  /* ---------- топбар ---------- */
  #topbar { position: fixed; z-index: 20; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 18px; padding-top: max(12px, env(safe-area-inset-top));
    background: linear-gradient(rgba(9, 11, 17, .92), rgba(9, 11, 17, .55) 75%, transparent); }
  .logo { font-weight: 800; font-size: 19px; letter-spacing: -.02em; white-space: nowrap; }
  .logo small { display: block; font-weight: 500; font-size: 11px; color: var(--dim); letter-spacing: .02em; }
  #legend { display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
  #legend::-webkit-scrollbar { display: none; }
  .pill { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    padding: 4px 10px; border: 1px solid var(--line); border-radius: 20px;
    color: var(--dim); font-size: 11.5px; }
  .pill i { width: 8px; height: 8px; border-radius: 50%; }
  .spacer { flex: 1; }
  #saved { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px;
    border-radius: 22px; background: rgba(53, 197, 109, .12);
    border: 1px solid rgba(53, 197, 109, .35); color: var(--free);
    font-size: 12.5px; font-weight: 650; white-space: nowrap; transition: transform .2s; }
  #saved.bump { transform: scale(1.12); }
  #clock { font-family: ui-monospace, Menlo, monospace; font-size: 21px;
    font-weight: 600; letter-spacing: .04em; font-variant-numeric: tabular-nums; }
  #mode { display: inline-flex; border: 1px solid var(--line); border-radius: 22px;
    overflow: hidden; white-space: nowrap; }
  #mode > * { padding: 7px 14px; font-size: 13px; text-decoration: none;
    color: var(--dim); }
  #mode .on { background: rgba(245, 166, 35, .16); color: var(--amber);
    font-weight: 650; }
  #mode a:hover { color: var(--text); }

  /* ---------- карта ---------- */
  #stage { position: fixed; inset: 0; touch-action: none; }
  #map { width: 100%; height: 100%; display: block; cursor: grab; }
  #map:active { cursor: grabbing; }
  #map text { user-select: none; -webkit-user-select: none; }
  .room { cursor: pointer; }
  .room .top { transition: fill-opacity .4s; }
  .room .glowpool, .room .aura { opacity: 0; transition: opacity .5s; }
  .room.occupied .glowpool { opacity: 1; }
  .room.awaiting .aura { opacity: 1; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: .25; } 50% { opacity: .85; } }
  .room .chip-bg { transition: fill .3s; }
  .flash { animation: flash 1.1s ease-out forwards; transform-origin: center; pointer-events: none; }
  @keyframes flash { from { opacity: .9; } to { opacity: 0; transform: scale(2.6); } }
  .funzone { cursor: pointer; }
  .me-pin { animation: mepulse 2s ease-in-out infinite; transform-box: fill-box;
    transform-origin: center; }
  @keyframes mepulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.35); } }

  /* ---------- этажи: активный резкий, остальные — призраки ---------- */
  .floorg { transition: opacity .45s ease, filter .45s ease; }
  .floorg.ghost { opacity: .35; filter: blur(4px) brightness(.7) saturate(.6);
    pointer-events: none; }

  /* переключалка этажей — как в ТЦ на картах */
  #floors { position: fixed; z-index: 16; right: 16px;
    bottom: max(16px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 4px; padding: 5px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    backdrop-filter: blur(10px); }
  #floors .cap { text-align: center; font-size: 9.5px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--dim); padding: 2px 0 1px; }
  #floors button { width: 42px; height: 40px; border: 0; border-radius: 10px;
    background: transparent; color: var(--dim); font: inherit; font-size: 15px;
    font-weight: 750; cursor: pointer; transition: background .2s, color .2s; }
  #floors button:hover { background: rgba(255, 255, 255, .07); color: var(--text); }
  #floors button.on { background: #f5c542; color: #201503; }

  /* ---------- карточка ---------- */
  #backdrop { position: fixed; inset: 0; z-index: 24; background: rgba(5, 6, 10, .45);
    opacity: 0; pointer-events: none; transition: opacity .25s; }
  #backdrop.show { opacity: 1; pointer-events: auto; }
  #card { position: fixed; z-index: 25; top: 86px; right: 16px; width: 340px;
    max-height: calc(100vh - 110px); overflow-y: auto;
    background: var(--panel); border: 1px solid var(--line); border-radius: 18px;
    backdrop-filter: blur(12px); box-shadow: 0 18px 60px rgba(0, 0, 0, .55);
    transform: translateX(24px); opacity: 0; pointer-events: none;
    transition: transform .25s, opacity .25s; }
  #card.show { transform: none; opacity: 1; pointer-events: auto; }
  #card .photo { position: relative; height: 168px; background: #222; }
  #card .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #card .photo .shade { position: absolute; inset: 0;
    background: linear-gradient(transparent 55%, rgba(10, 12, 18, .9)); }
  #card .photo .name { position: absolute; left: 16px; bottom: 10px; right: 44px;
    font-size: 21px; font-weight: 800; letter-spacing: -.01em;
    text-shadow: 0 1px 8px rgba(0,0,0,.7); }
  #card .close { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px;
    border-radius: 50%; background: rgba(10, 12, 18, .6); color: #fff; font-size: 16px;
    line-height: 32px; text-align: center; }
  #card .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px 0; }
  #card .chips .c { padding: 3px 10px; border: 1px solid var(--line); border-radius: 16px;
    font-size: 12px; color: var(--dim); }
  #card .status { display: flex; gap: 9px; align-items: baseline; padding: 12px 16px 0;
    font-size: 16px; font-weight: 700; }
  #card .status .dot { flex: none; width: 10px; height: 10px; border-radius: 50%;
    align-self: center; }
  #card .timer { font-family: ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
  #card .sub { padding: 4px 16px 0; color: var(--dim); font-size: 13.5px; }
  #card .badge { display: inline-block; margin: 8px 16px 0; padding: 4px 10px;
    border-radius: 20px; font-size: 12px; font-weight: 650;
    background: rgba(53, 197, 109, .14); color: var(--free); }
  #card .badge.noshow { background: rgba(245, 166, 35, .13); color: var(--amber); }
  #card .next { padding: 10px 16px 0; font-size: 13.5px; color: var(--dim); }
  #card .next b { color: var(--text); font-weight: 650; }
  #card .tl { position: relative; height: 30px; margin: 12px 16px 4px;
    background: rgba(255, 255, 255, .06); border-radius: 7px; overflow: hidden; }
  #card .tl .ev { position: absolute; top: 4px; bottom: 4px; border-radius: 4px;
    background: var(--busy); opacity: .9; }
  #card .tl .ev.past { opacity: .3; }
  #card .tl .ev.cur { box-shadow: 0 0 0 1.5px #fff inset; }
  #card .tl .ev.ghost { opacity: .3;
    background: repeating-linear-gradient(135deg, var(--amber) 0 4px, transparent 4px 8px); }
  #card .tl .now { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff;
    box-shadow: 0 0 7px rgba(255, 255, 255, .9); }
  #card .tlcap { display: flex; justify-content: space-between; margin: 0 16px;
    color: var(--dim); font-size: 10px; font-family: ui-monospace, Menlo, monospace; }
  #card .summary { padding: 10px 16px 0; font-size: 13.5px; color: var(--dim); }
  #card .cardpad { height: 18px; }
  #card .grab { display: none; }

  /* ---------- тост Б24 ---------- */
  #toast { position: fixed; z-index: 30; left: 50%; transform: translate(-50%, -20px);
    top: max(74px, calc(env(safe-area-inset-top) + 60px));
    display: flex; gap: 11px; align-items: center; width: 340px; max-width: calc(100vw - 28px);
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 15px; box-shadow: 0 14px 44px rgba(0, 0, 0, .5);
    opacity: 0; pointer-events: none; transition: opacity .3s, transform .3s;
    backdrop-filter: blur(10px); }
  #toast.show { opacity: 1; transform: translate(-50%, 0); }
  #toast .b24 { flex: none; width: 38px; height: 38px; border-radius: 10px;
    background: #24b23e; color: #fff; font-weight: 800; font-size: 13px;
    display: flex; align-items: center; justify-content: center; }
  #toast .tt { font-weight: 700; font-size: 13.5px; }
  #toast .tx { color: var(--dim); font-size: 12.5px; margin-top: 1px; }

  /* ---------- мобильная раскладка ---------- */
  @media (max-width: 760px) {
    #topbar { gap: 8px; padding: 10px 12px; padding-top: max(10px, env(safe-area-inset-top)); }
    .logo { font-size: 16px; }
    #clock { font-size: 16px; order: 2; }
    #qrlink { order: 3; padding: 6px 11px; font-size: 12px; }
    #saved { order: 4; font-size: 11.5px; padding: 5px 10px; }
    #legend { order: 5; flex-basis: 100%; }
    #card { top: auto; right: 0; left: 0; bottom: 0; width: auto;
      max-height: 78vh; border-radius: 22px 22px 0 0; border-bottom: 0;
      transform: translateY(30px); padding-bottom: env(safe-area-inset-bottom); }
    #card.show { transform: none; }
    #card .grab { display: block; position: absolute; z-index: 2; top: 8px; left: 50%;
      transform: translateX(-50%); width: 44px; height: 5px; border-radius: 3px;
      background: rgba(255, 255, 255, .45); }
    #card .photo { height: 148px; }
  }
</style>

  <div class="logo">Живой офис<small>крыло · <span id="floorlabel">5 этаж</span> · Битрикс24</small></div>

    <span class="pill"><i style="background:var(--free)"></i>свободна</span>

<script>
/*APP-START*/
(function () {
  'use strict';
  var LO = window.LivingOffice;
  var iso = LO.iso, fmt = LO.fmt;
  var engine = LO.createEngine();
  window.LO_ENGINE = engine;   // для демо-хуков и стыковки с Б24
  LO.mountDemoPanel(engine);

  // живые данные: по умолчанию бэкенд button (адрес — в shared/config.js);
  // ?api=<url> — другой адрес, ?api=off — принудительно моки
  var apiUrl = window.LivingOfficeB24 ? LivingOfficeB24.resolveApi(location.search) : null;
  if (apiUrl) LivingOfficeB24.connect(engine, apiUrl);

  var S = 30, H = 52, FUN_H = 10;
  var svg = document.getElementById('map');
  var NS = 'http://www.w3.org/2000/svg';
  var activeFloor = 5;   // текущий этаж на карте

  /* ---------- сборка сцены ---------- */

  function el(tag, attrs, parent) {
    var n = document.createElementNS(NS, tag);
    for (var k in attrs) n.setAttribute(k, attrs[k]);
    if (parent) parent.appendChild(n);
    return n;
  }

  var view = null; // {x,y,w,h} текущий viewBox

  function buildScene() {
    svg.textContent = '';

    var defs = el('defs', {}, svg);
    defs.innerHTML =
      '<radialGradient id="pool"><stop offset="0%" stop-color="#ffb648" stop-opacity=".5"/>' +
      '<stop offset="100%" stop-color="#ffb648" stop-opacity="0"/></radialGradient>' +
      '<radialGradient id="auraG"><stop offset="55%" stop-color="#f5a623" stop-opacity=".38"/>' +
      '<stop offset="100%" stop-color="#f5a623" stop-opacity="0"/></radialGradient>' +
      '<filter id="soft" x="-40%" y="-40%" width="180%" height="180%">' +
      '<feGaussianBlur stdDeviation="6"/></filter>' +
      '<linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#b5ddf8"/>' +
      '<stop offset="70%" stop-color="#8ec4ee"/>' +
      '<stop offset="100%" stop-color="#7ab4e4"/></linearGradient>';

    var b = iso.bounds([LO.FLOOR], S, H);
    var pad = 70;
    if (!view) {
      if (window.innerWidth < 760) {
        // мобильный старт: зум на холл, дальше — пан/пинч к крыльям
        var aspect = svg.clientHeight / Math.max(1, svg.clientWidth);
        var cc = iso.project(43, 12, S);
        var vw = b.w * 0.38, vh = vw * aspect;
        view = { x: cc.x - vw / 2, y: cc.y - vh / 2 - 20, w: vw, h: vh };
      } else {
        view = { x: b.x - pad, y: b.y - pad, w: b.w + pad * 2, h: b.h + pad * 2 + 40 };
      }
    }
    applyView();

    var world = el('g', { id: 'world' }, svg);

    // этажи стопкой: неактивные рисуем первыми (призраки), активный — поверх
    LO.FLOORS.slice().sort(function (a, b2) {
      return (a.num === activeFloor ? 1 : 0) - (b2.num === activeFloor ? 1 : 0);
    }).forEach(function (fl) {
      var gF = el('g', {
        'class': 'floorg' + (fl.num === activeFloor ? '' : ' ghost'),
        id: 'floorg-' + fl.num,
        transform: 'translate(0,' + floorOffset(fl.num) + ')'
      }, world);
      buildFloor(gF, fl.num);
    });
  }

  /* экранный сдвиг этажа: верхний в списке FLOORS — выше на экране */
  var FLOOR_GAP = 340;
  function floorOffset(num) {
    var idx = 0;
    LO.FLOORS.forEach(function (fl, k) { if (fl.num === num) idx = k; });
    return idx * FLOOR_GAP;
  }
  function floorOf(o) { return o.floor || 5; }

  function buildFloor(world, floorNum) {
    function mine(o) { return floorOf(o) === floorNum; }

    var f = LO.FLOOR;

    // плита-основание
    var fp = iso.prism(f, S, 0);
    el('polygon', { points: iso.pts(fp.floor.map(function (p) { return { x: p.x, y: p.y + 14 }; })),
      fill: '#0e111a' }, world);

    // каменная плитка в шахматку — как в реальном офисе, приглушена под ночь
    var tones = ['#453f36', '#33302b', '#4e473d'];
    var paths = ['', '', ''];
    var i, j;
    for (i = 0; i < f.w; i++) {
      for (j = 0; j < f.h; j++) {
        var c0 = iso.project(f.x + i, f.y + j, S),
            c1 = iso.project(f.x + i + 1, f.y + j, S),
            c2 = iso.project(f.x + i + 1, f.y + j + 1, S),
            c3 = iso.project(f.x + i, f.y + j + 1, S);
        var tone = (i + j) % 2 ? 1 : 0;
        if ((i * 7 + j * 13) % 19 === 0) tone = 2;
        paths[tone] += 'M' + c0.x.toFixed(1) + ' ' + c0.y.toFixed(1) +
          'L' + c1.x.toFixed(1) + ' ' + c1.y.toFixed(1) +
          'L' + c2.x.toFixed(1) + ' ' + c2.y.toFixed(1) +
          'L' + c3.x.toFixed(1) + ' ' + c3.y.toFixed(1) + 'Z';
      }
    }
    paths.forEach(function (d, k) {
      el('path', { d: d, fill: tones[k], stroke: '#14161e',
        'stroke-width': .55, 'stroke-opacity': .7 }, world);
    });
    el('polygon', { points: iso.pts(fp.floor), fill: 'none', stroke: '#262b3d',
      'stroke-width': 1.4 }, world);

    // подписи зон на полу
    LO.AREAS.filter(mine).forEach(function (a) {
      var c = iso.project((a.x0 + a.x1) / 2, 22.4, S);
      var t = el('text', { x: c.x, y: c.y, 'text-anchor': 'middle', 'font-size': 34,
        'font-weight': 800, fill: 'rgba(232,235,245,.07)', 'letter-spacing': 8 }, world);
      t.textContent = a.name.toUpperCase();
    });

    // порядок отрисовки: фон-стены → зона → стена-перегородка → зона → …
    // фазы: 0 задние стены · 1 разработка · 2 стена 27.5 · 3 холл · 4 стена 58.5 · 5 QA
    // на 2 этаже перегородки свои: x=58 (соседи) и x=70 (общая стена переговорок)
    function zonePhase(cx) {
      if (floorNum === 2) return cx < 58 ? 1 : cx < 70 ? 3 : 5;
      return cx < 27.5 ? 1 : cx < 58.5 ? 3 : 5;
    }
    var items = [];
    function pushObj(rect, fn) {
      items.push({ phase: zonePhase(rect.x + (rect.w || 0) / 2),
        sub: rect.x + rect.y, f: fn });
    }
    LO.ROOMS.filter(mine).forEach(function (r) { pushObj(r.rect, function () { buildRoom(world, r); }); });
    LO.FUNZONES.filter(mine).forEach(function (z) { pushObj(z.rect, function () { buildFun(world, z); }); });
    LO.DECOR.filter(mine).forEach(function (d) { pushObj(d.rect, function () { buildDecor(world, d); }); });
    LO.DESKS.filter(mine).forEach(function (d) { pushObj({ x: d.x, y: d.y, w: d.cols * 1.6 },
      function () { buildDeskCluster(world, d); }); });
    LO.WALLS.filter(mine).forEach(function (w) {
      var backWall = (w.a.y === 0 && w.b.y === 0) || (w.a.x === 0 && w.b.x === 0);
      var phase = w.phase !== undefined ? w.phase : (backWall ? 0 : (w.a.x < 40 ? 2 : 4));
      var dx = w.b.x - w.a.x, dy = w.b.y - w.a.y;
      var steps = Math.max(1, Math.ceil(Math.max(Math.abs(dx), Math.abs(dy)) / 3));
      for (var s = 0; s < steps; s++) {
        (function (s2) {
          var p0 = { x: w.a.x + dx * s2 / steps,       y: w.a.y + dy * s2 / steps };
          var p1 = { x: w.a.x + dx * (s2 + 1) / steps, y: w.a.y + dy * (s2 + 1) / steps };
          var art = (w.art && s2 === Math.floor(steps / 2)) ? w.art : null;
          items.push({ phase: phase, sub: p0.x + p0.y,
            f: function () { buildWallChunk(world, p0, p1, w.h, art); } });
        })(s);
      }
    });
    items.sort(function (a, b2) {
      return a.phase - b2.phase || a.sub - b2.sub;
    });
    items.forEach(function (it) { it.f(); });
  }

  /* белые стены офиса; на некоторых — полигональный рисунок */
  var ART = {
    deer:  ['#e58fb1', '#f2b56b', '#7fc8c2', '#b593d6', '#f2dc6b', '#e58fb1', '#7fc8c2'],
    whale: ['#5b8def', '#7fb0e8', '#3d6fd8', '#9fc5f2', '#4a5f9e', '#5b8def', '#7fb0e8']
  };

  function buildWallChunk(parent, a, b, h, art) {
    var A = iso.project(a.x, a.y, S), B = iso.project(b.x, b.y, S);
    var horizontal = Math.abs(b.y - a.y) < 0.01;
    el('polygon', { points: iso.pts([
      { x: A.x, y: A.y - h }, { x: B.x, y: B.y - h }, B, A]),
      fill: horizontal ? '#8e94a8' : '#7c8296', 'fill-opacity': .96 }, parent);
    el('line', { x1: A.x, y1: A.y - h, x2: B.x, y2: B.y - h,
      stroke: '#c9cede', 'stroke-width': 1.6 }, parent);

    // окна с дневным небом — верх дальней стены (y=0), кроме чанков с рисунком
    if (!art && a.y < 0.01 && b.y < 0.01) {
      function P(t, up) {
        return { x: A.x + (B.x - A.x) * t, y: A.y + (B.y - A.y) * t - up };
      }
      var TOP = h - 5, BOT = 16;
      el('polygon', { points: iso.pts([P(.14, TOP), P(.86, TOP), P(.86, BOT), P(.14, BOT)]),
        fill: 'url(#skyG)', stroke: '#e8eef8', 'stroke-width': 1.6 }, parent);
      // облака — по-разному в шахматном порядке чанков
      var alt = Math.floor(a.x / 3) % 2;
      var c1 = P(alt ? .32 : .6, TOP - 7), c2 = P(alt ? .66 : .34, BOT + 6);
      el('ellipse', { cx: c1.x, cy: c1.y, rx: 6, ry: 2, fill: '#fff', 'fill-opacity': .85 }, parent);
      el('ellipse', { cx: c2.x, cy: c2.y, rx: 4, ry: 1.5, fill: '#fff', 'fill-opacity': .7 }, parent);
      // рамы: вертикальный импост и горизонтальная перекладина
      var m0 = P(.5, TOP), m1 = P(.5, BOT);
      el('line', { x1: m0.x, y1: m0.y, x2: m1.x, y2: m1.y,
        stroke: '#e8eef8', 'stroke-width': 1.2 }, parent);
      var mid = (TOP + BOT) / 2;
      el('line', { x1: P(.14, mid).x, y1: P(.14, mid).y, x2: P(.86, mid).x, y2: P(.86, mid).y,
        stroke: '#e8eef8', 'stroke-width': 1 }, parent);
    }
    if (art) {
      var pal = ART[art] || ART.deer;
      var mx = (A.x + B.x) / 2, my = (A.y + B.y) / 2 - h * 0.52;
      var dirx = (B.x - A.x) / Math.max(1, Math.hypot(B.x - A.x, B.y - A.y));
      var diry = (B.y - A.y) / Math.max(1, Math.hypot(B.x - A.x, B.y - A.y));
      for (var i = 0; i < 7; i++) {
        var off = (i - 3) * 9;
        var cx = mx + dirx * off, cy = my + diry * off + ((i % 3) - 1) * 6;
        var s1 = 7 + (i % 3) * 4;
        el('polygon', { points:
          (cx) + ',' + (cy - s1) + ' ' + (cx + s1 * .9) + ',' + (cy + s1 * .6) + ' ' +
          (cx - s1 * .8) + ',' + (cy + s1 * .5),
          fill: pal[i], 'fill-opacity': .85 }, parent);
      }
    }
  }

  /* столы рассадки: столешница + монитор + стул; «Я» — золотой пин */
  function buildDeskCluster(parent, d) {
    var DW = 1.35, DHt = 1.05, GX = 0.25, GY = 0.45;
    var BE = '#c8b393', BE1 = '#a8946f', BE2 = '#96825e';
    function lift(q, up) { return { x: q.x, y: q.y - up }; }
    function toward(q, cx, cy, k) { return { x: cx + (q.x - cx) * k, y: cy + (q.y - cy) * k }; }
    for (var r = 0; r < d.rows; r++) {
      for (var c = 0; c < d.cols; c++) {
        var name = d.names[r * d.cols + c] || '';
        var rect = { x: d.x + c * (DW + GX), y: d.y + r * (DHt + GY), w: DW, h: DHt };
        var p = iso.prism(rect, S, 7);
        var c2 = iso.center(rect, S);

        // бежевая столешница
        el('polygon', { points: iso.pts(p.right), fill: BE1 }, parent);
        el('polygon', { points: iso.pts(p.front), fill: BE2 }, parent);
        el('polygon', { points: iso.pts(p.top), fill: BE, stroke: '#6e5a3d',
          'stroke-width': .6, 'stroke-opacity': .55 }, parent);

        // ноутбук у дальнего края (~треть ширины стола)
        var lcx = rect.x + rect.w / 2, yB = rect.y + 0.3, yF = rect.y + 0.66,
            xL = lcx - 0.22, xR = lcx + 0.22;
        // клавиатура-база на поверхности
        el('polygon', { points: iso.pts([
          lift(iso.project(xL, yB, S), 7), lift(iso.project(xR, yB, S), 7),
          lift(iso.project(xR, yF, S), 7), lift(iso.project(xL, yF, S), 7)]),
          fill: '#20242e', stroke: '#12141c', 'stroke-width': .5 }, parent);
        // наклонённый экран
        var sbl = lift(iso.project(xL, yB, S), 7),
            sbr = lift(iso.project(xR, yB, S), 7),
            str = lift(iso.project(xR, yB - 0.06, S), 19),
            stl = lift(iso.project(xL, yB - 0.06, S), 19);
        el('polygon', { points: iso.pts([sbl, sbr, str, stl]),
          fill: '#0c0e15', stroke: '#5b6378', 'stroke-width': .8 }, parent);
        var gcx = (sbl.x + sbr.x + str.x + stl.x) / 4,
            gcy = (sbl.y + sbr.y + str.y + stl.y) / 4;
        el('polygon', { points: iso.pts([
          toward(sbl, gcx, gcy, .62), toward(sbr, gcx, gcy, .62),
          toward(str, gcx, gcy, .62), toward(stl, gcx, gcy, .62)]),
          fill: '#2e3548' }, parent);

        // чёрное офисное кресло перед столом (южная сторона)
        var seat = iso.project(rect.x + rect.w / 2, rect.y + rect.h + 0.45, S),
            back = iso.project(rect.x + rect.w / 2, rect.y + rect.h + 0.72, S);
        // крестовина-основание на полу
        el('ellipse', { cx: seat.x, cy: seat.y + 1, rx: 6.5, ry: 3.1, fill: '#12141c' }, parent);
        // спинка за сиденьем (дальше от стола)
        el('polygon', { points: iso.pts([
          { x: back.x - 4.5, y: back.y - 7 }, { x: back.x + 4.5, y: back.y - 7 },
          { x: back.x + 4,   y: back.y - 20 }, { x: back.x - 4, y: back.y - 20 }]),
          fill: '#16181f', stroke: '#2c3242', 'stroke-width': .7 }, parent);
        // стойка
        el('line', { x1: seat.x, y1: seat.y, x2: seat.x, y2: seat.y - 8,
          stroke: '#2c3242', 'stroke-width': 2 }, parent);
        // сиденье
        el('ellipse', { cx: seat.x, cy: seat.y - 8, rx: 6.5, ry: 3.4,
          fill: '#16181f', stroke: '#2c3242', 'stroke-width': .7 }, parent);

        if (name.indexOf('(я)') > -1) {
          el('circle', { 'class': 'me-pin', cx: c2.x, cy: c2.y - 26, r: 5.5,
            fill: '#f5c542', stroke: '#0b0d13', 'stroke-width': 1.5 }, parent);
          var tm = el('text', { x: c2.x, y: c2.y - 23.6, 'text-anchor': 'middle',
            'font-size': 6.5, 'font-weight': 800, fill: '#201503' }, parent);
          tm.textContent = 'Я';
        }
      }
    }
  }

  /* теннисный стол: синяя плита на ножках, разметка, сетка, ракетки, мяч */
  function buildTennis(parent, z) {
    var g = el('g', { 'class': 'funzone', id: 'fun-tennis' }, parent);
    g.addEventListener('click', function (e) {
      e.stopPropagation();
      if (consumeDrag()) return;
      openCard(z);
    });
    var r = { x: z.rect.x + 0.5, y: z.rect.y + 0.4, w: z.rect.w - 1, h: z.rect.h - 0.8 };
    var TH = 16, NH = 8;
    var c = iso.center(z.rect, S);

    el('ellipse', { cx: c.x, cy: c.y + 3, rx: (r.w + r.h) * S * .4,
      ry: (r.w + r.h) * S * .19, fill: 'rgba(0,0,0,.35)' }, g);

    [[r.x + .35, r.y + .3], [r.x + r.w - .35, r.y + .3],
     [r.x + .35, r.y + r.h - .3], [r.x + r.w - .35, r.y + r.h - .3]]
      .forEach(function (pt) {
        var p = iso.project(pt[0], pt[1], S);
        el('line', { x1: p.x, y1: p.y, x2: p.x, y2: p.y - TH,
          stroke: '#161a26', 'stroke-width': 3.5 }, g);
      });

    // пасхалка: настоящая фотка выглядывает из-за дальнего края стола
    // (рисуем до плиты — низ круга прячется за кромкой; пальцы — после)
    var eg = iso.project(r.x + r.w * 0.72, r.y, S);
    var hy = eg.y - TH - 6, ER = 8;
    var clip = el('clipPath', { id: 'egg-clip' }, g);
    el('circle', { cx: eg.x, cy: hy, r: ER }, clip);
    el('image', { href: 'photos/tennis-guy.png?v=1',
      x: eg.x - ER, y: hy - ER, width: ER * 2, height: ER * 2,
      preserveAspectRatio: 'xMidYMid slice',
      'clip-path': 'url(#egg-clip)' }, g);
    el('circle', { cx: eg.x, cy: hy, r: ER, fill: 'none',
      stroke: '#12151d', 'stroke-width': 1 }, g);

    var p = iso.prism(r, S, TH);
    function drop(q, d) { return { x: q.x, y: q.y + d }; }
    el('polygon', { points: iso.pts([p.top[1], p.top[2], drop(p.top[2], 3), drop(p.top[1], 3)]),
      fill: '#1c3f63' }, g);
    el('polygon', { points: iso.pts([p.top[3], p.top[2], drop(p.top[2], 3), drop(p.top[3], 3)]),
      fill: '#17395b' }, g);
    el('polygon', { points: iso.pts(p.top), fill: '#2b5d8c',
      stroke: '#e8edf5', 'stroke-width': 1.2, 'stroke-opacity': .85 }, g);

    // пальцы пасхалки на кромке — поверх плиты
    var fA = iso.project(r.x + r.w * 0.64, r.y, S), fB = iso.project(r.x + r.w * 0.8, r.y, S);
    [.12, .36, .62, .86].forEach(function (ftg) {
      el('circle', { cx: fA.x + (fB.x - fA.x) * ftg,
        cy: fA.y + (fB.y - fA.y) * ftg - TH + 1.2, r: 1.1, fill: '#e9bd98' }, g);
    });

    // центральная линия вдоль стола
    var l0 = iso.project(r.x + .12, r.y + r.h / 2, S),
        l1 = iso.project(r.x + r.w - .12, r.y + r.h / 2, S);
    el('line', { x1: l0.x, y1: l0.y - TH, x2: l1.x, y2: l1.y - TH,
      stroke: '#e8edf5', 'stroke-width': 1, 'stroke-opacity': .8 }, g);

    // сетка поперёк с ниточками и стойками
    var n0 = iso.project(r.x + r.w / 2, r.y - 0.08, S),
        n1 = iso.project(r.x + r.w / 2, r.y + r.h + 0.08, S);
    el('polygon', { points: iso.pts([
      { x: n0.x, y: n0.y - TH - NH }, { x: n1.x, y: n1.y - TH - NH },
      { x: n1.x, y: n1.y - TH }, { x: n0.x, y: n0.y - TH }]),
      fill: 'rgba(226,232,244,.26)' }, g);
    for (var i = 1; i < 8; i++) {
      var t = i / 8, nx = n0.x + (n1.x - n0.x) * t, ny = n0.y + (n1.y - n0.y) * t;
      el('line', { x1: nx, y1: ny - TH - NH, x2: nx, y2: ny - TH,
        stroke: 'rgba(226,232,244,.4)', 'stroke-width': .6 }, g);
    }
    el('line', { x1: n0.x, y1: n0.y - TH - NH, x2: n1.x, y2: n1.y - TH - NH,
      stroke: '#eef2f8', 'stroke-width': 1.7 }, g);
    el('line', { x1: n0.x, y1: n0.y - TH, x2: n0.x, y2: n0.y - TH - NH,
      stroke: '#c9cede', 'stroke-width': 1.6 }, g);
    el('line', { x1: n1.x, y1: n1.y - TH, x2: n1.x, y2: n1.y - TH - NH,
      stroke: '#c9cede', 'stroke-width': 1.6 }, g);

    // ракетки и мяч
    function paddle(px, py, color) {
      var q = iso.project(px, py, S);
      el('line', { x1: q.x + 3.5, y1: q.y - TH + 1, x2: q.x + 7.5, y2: q.y - TH + 3.5,
        stroke: '#8a6d3f', 'stroke-width': 2.2 }, g);
      el('ellipse', { cx: q.x, cy: q.y - TH - 1, rx: 5, ry: 3.2,
        fill: color, stroke: '#12151d', 'stroke-width': .8 }, g);
    }
    paddle(r.x + 1.4, r.y + 0.55, '#d64545');
    paddle(r.x + r.w - 1.3, r.y + r.h - 0.5, '#2b2f3d');
    var ball = iso.project(r.x + r.w - 1.1, r.y + 0.6, S);
    el('circle', { cx: ball.x, cy: ball.y - TH - 2, r: 2, fill: '#f5f7fb' }, g);

    var lb = el('text', { x: c.x, y: c.y + (z.rect.h * S * .5) + 22, 'text-anchor': 'middle',
      'font-size': 10.5, fill: '#8b93ab', 'font-weight': 650,
      'paint-order': 'stroke', stroke: 'rgba(8,10,16,.8)', 'stroke-width': 3 }, g);
    lb.textContent = z.name;
  }

  /* кикер: тёмный корпус, зелёное поле, штанги с ручками и игроками */

  /* массажное кресло-ямагучи: бежевый лежак с подголовником и подлокотниками */

  /* ресепшн (дерево + мосс-стена Битрикс24) и лифт */
  function buildDecor(parent, d) {
    var c = iso.center(d.rect, S);
    if (d.kind === 'pouf') {
      // низкий мягкий цилиндр: тень → бочок → крышка
      var prx = (d.rect.w + d.rect.h) * S * .27, pry = prx * .5, PH = 9;
      el('ellipse', { cx: c.x, cy: c.y + 2, rx: prx * 1.08, ry: pry,
        fill: 'rgba(0,0,0,.3)' }, parent);
      el('ellipse', { cx: c.x, cy: c.y, rx: prx, ry: pry,
        fill: shade(d.color, .62) }, parent);
      el('rect', { x: c.x - prx, y: c.y - PH, width: prx * 2, height: PH,
        fill: shade(d.color, .72) }, parent);
      el('ellipse', { cx: c.x, cy: c.y - PH, rx: prx, ry: pry,
        fill: d.color, stroke: shade(d.color, .5), 'stroke-width': .8 }, parent);
      // шов-утяжка по центру крышки
      el('ellipse', { cx: c.x, cy: c.y - PH, rx: prx * .45, ry: pry * .45,
        fill: 'none', stroke: shade(d.color, .78), 'stroke-width': .7 }, parent);
      return;
    }
    if (d.kind === 'reception') {
      /* по фото IMG_4888: мосс-стена с трек-подсветкой, светлая стойка-волна
         из ламелей, подвесные диски, огнетушитель и мелочи на стойке */
      var WH = 36;
      var wa = { x: d.rect.x - 0.3, y: d.rect.y - 0.4 },
          wb = { x: d.rect.x + d.rect.w + 0.3, y: d.rect.y - 0.4 };
      var WA = iso.project(wa.x, wa.y, S), WB = iso.project(wb.x, wb.y, S);
      function W(t2, up) {
        return { x: WA.x + (WB.x - WA.x) * t2, y: WA.y + (WB.y - WA.y) * t2 - up };
      }
      // мосс-стена: тёмная основа + «кочки» мха в четырёх тонах
      el('polygon', { points: iso.pts([W(0, WH), W(1, WH), W(1, 0), W(0, 0)]),
        fill: '#24462b' }, parent);
      var mossTones = ['#2c5535', '#346340', '#1e3d25', '#3a7046'];
      for (var mi = 0; mi < 60; mi++) {
        var mp = W((mi * 37 % 97) / 97, 4 + (mi * 13 % 29));
        el('ellipse', { cx: mp.x, cy: mp.y, rx: 2.6 + (mi * 7 % 5),
          ry: 1.8 + (mi * 11 % 4) * .5,
          fill: mossTones[mi % 4], 'fill-opacity': .9 }, parent);
      }
      // трек со споттами — конусы света по мху
      el('line', { x1: W(.08, WH + 4).x, y1: W(.08, WH + 4).y,
        x2: W(.92, WH + 4).x, y2: W(.92, WH + 4).y,
        stroke: '#1a1e28', 'stroke-width': 2 }, parent);
      [.2, .5, .8].forEach(function (lt) {
        var lp = W(lt, WH + 2);
        el('circle', { cx: lp.x, cy: lp.y, r: 2.4, fill: '#12151d',
          stroke: '#3a4152', 'stroke-width': .8 }, parent);
        el('polygon', { points: iso.pts([W(lt - .02, WH), W(lt + .02, WH),
          W(lt + .09, WH * .3), W(lt - .09, WH * .3)]),
          fill: 'rgba(214, 255, 176, .12)' }, parent);
        el('ellipse', { cx: W(lt, WH * .68).x, cy: W(lt, WH * .68).y,
          rx: 7, ry: 4.5, fill: 'rgba(198, 245, 160, .2)' }, parent);
      });
      // логотип на мху — справа, как в жизни
      var bt = el('text', { x: W(.78, WH * .55).x, y: W(.78, WH * .55).y,
        'text-anchor': 'middle', 'font-size': 7.5, 'font-weight': 750,
        fill: '#d6efcf', 'letter-spacing': .8 }, parent);
      bt.textContent = 'Битрикс24';
      // огнетушитель у левого края
      var ep = W(.035, 0);
      el('rect', { x: ep.x - 1.6, y: ep.y - 9, width: 3.2, height: 9, rx: 1.4,
        fill: '#c23b30' }, parent);
      el('line', { x1: ep.x, y1: ep.y - 9, x2: ep.x, y2: ep.y - 11,
        stroke: '#1a1e28', 'stroke-width': 1.4 }, parent);
      // подвесные светильники-диски: белые и тёмные, на разной высоте
      [[.3, 30, 6.5, '#eef1f7'], [.45, 24, 4.5, '#2c3242'],
       [.62, 33, 8, '#f4f6fa'], [.75, 26, 5, '#39414f']].forEach(function (dk) {
        var dp = W(dk[0], 0), dy = dp.y + 10;
        el('line', { x1: dp.x, y1: dy - WH - 14, x2: dp.x, y2: dy - dk[1],
          stroke: 'rgba(200, 208, 226, .5)', 'stroke-width': .7 }, parent);
        el('ellipse', { cx: dp.x, cy: dy - dk[1], rx: dk[2], ry: dk[2] * .38,
          fill: dk[3], stroke: '#12151d', 'stroke-width': .6 }, parent);
      });
      // стойка: светлое дерево, ламельный фасад с волной
      var p = iso.prism(d.rect, S, 13);
      el('polygon', { points: iso.pts(p.right), fill: '#b5a075' }, parent);
      el('polygon', { points: iso.pts(p.front), fill: '#cbb68d' }, parent);
      var F0 = p.front[0], F1 = p.front[1], B0 = p.front[3], B1 = p.front[2];
      var LN = 34;
      for (var li = 1; li < LN; li++) {
        var ft = li / LN;
        var wv = Math.sin(ft * Math.PI * 3 + 1) * 1.5;
        el('line', {
          x1: F0.x + (F1.x - F0.x) * ft, y1: F0.y + (F1.y - F0.y) * ft + 1 + wv * .4,
          x2: B0.x + (B1.x - B0.x) * ft, y2: B0.y + (B1.y - B0.y) * ft + wv,
          stroke: li % 2 ? '#dcc99f' : '#a8946b', 'stroke-width': 1.5,
          'stroke-opacity': .85 }, parent);
      }
      el('polygon', { points: iso.pts(p.top), fill: '#e0d2ab',
        stroke: '#8d7a52', 'stroke-width': .7, 'stroke-opacity': .6 }, parent);
      // цветы в вазе и бутылки воды на стойке
      var vz = iso.project(d.rect.x + d.rect.w * .82, d.rect.y + d.rect.h * .4, S);
      el('line', { x1: vz.x, y1: vz.y - 13, x2: vz.x, y2: vz.y - 17,
        stroke: '#6e5a3d', 'stroke-width': 1.2 }, parent);
      el('ellipse', { cx: vz.x, cy: vz.y - 19, rx: 4, ry: 2.6, fill: '#3f7d4a' }, parent);
      el('circle', { cx: vz.x - 2, cy: vz.y - 20, r: 1, fill: '#e58fb1' }, parent);
      el('circle', { cx: vz.x + 2.2, cy: vz.y - 19, r: 1, fill: '#f2dc6b' }, parent);
      for (var bi = 0; bi < 3; bi++) {
        var bp = iso.project(d.rect.x + d.rect.w * (.38 + bi * .05), d.rect.y + d.rect.h * .35, S);
        el('rect', { x: bp.x - 1, y: bp.y - 18, width: 2, height: 5.5, rx: 1,
          fill: 'rgba(168, 214, 246, .85)' }, parent);
      }
      var t = el('text', { x: c.x, y: c.y + 18, 'text-anchor': 'middle',
        'font-size': 9.5, fill: '#8b93ab', 'font-weight': 650,
        'paint-order': 'stroke', stroke: 'rgba(8,10,16,.85)', 'stroke-width': 2.5 }, parent);
      t.textContent = 'Ресепшн';
    } else {
      var p2 = iso.prism(d.rect, S, 42);
      el('polygon', { points: iso.pts(p2.right), fill: '#242a38' }, parent);
      el('polygon', { points: iso.pts(p2.front), fill: '#2c3242' }, parent);
      el('polygon', { points: iso.pts(p2.top), fill: '#3a4152', stroke: '#4a5166',
        'stroke-width': 1 }, parent);
      var t2 = el('text', { x: c.x, y: c.y - 8, 'text-anchor': 'middle',
        'font-size': 11, 'font-weight': 700, fill: '#8b93ab',
        'paint-order': 'stroke', stroke: 'rgba(8,10,16,.85)', 'stroke-width': 3 }, parent);
      t2.textContent = 'Лифт';
    }
  }

  function shade(hex, k) { // затемнение цвета
    var n = parseInt(hex.slice(1), 16);
    var r = Math.round(((n >> 16) & 255) * k), g = Math.round(((n >> 8) & 255) * k),
        bl = Math.round((n & 255) * k);
    return 'rgb(' + r + ',' + g + ',' + bl + ')';
  }

  /* ---------- интерьер переговорок: рисуется до стекла, просвечивает ---------- */

  var GREY  = { top: '#9aa0b2', side: '#7a8194', dark: '#697083' };
  var BEIGE = { top: '#c8b393', side: '#a8946f', dark: '#96825e' };

  /* коробка-призма для мебели */
  function furnBox(parent, rr, h, cols) {
    var p = iso.prism(rr, S, h);
    el('polygon', { points: iso.pts(p.right), fill: cols.side }, parent);
    el('polygon', { points: iso.pts(p.front), fill: cols.dark }, parent);
    el('polygon', { points: iso.pts(p.top), fill: cols.top,
      stroke: 'rgba(20,24,34,.4)', 'stroke-width': .5 }, parent);
  }

  /* чёрное офисное кресло; dir — куда «смотрит» (n/s/e/w) */
  function officeChair(parent, gx, gy, dir) {
    var off = { n: [0, .3], s: [0, -.3], e: [-.3, 0], w: [.3, 0] }[dir] || [0, .3];
    var seat = iso.project(gx, gy, S),
        back = iso.project(gx + off[0], gy + off[1], S);
    el('ellipse', { cx: seat.x, cy: seat.y + 1, rx: 6.5, ry: 3.1, fill: '#12141c' }, parent);
    el('polygon', { points: iso.pts([
      { x: back.x - 4.5, y: back.y - 7 }, { x: back.x + 4.5, y: back.y - 7 },
      { x: back.x + 4,   y: back.y - 20 }, { x: back.x - 4, y: back.y - 20 }]),
      fill: '#16181f', stroke: '#2c3242', 'stroke-width': .7 }, parent);
    el('line', { x1: seat.x, y1: seat.y, x2: seat.x, y2: seat.y - 8,
      stroke: '#2c3242', 'stroke-width': 2 }, parent);
    el('ellipse', { cx: seat.x, cy: seat.y - 8, rx: 6.5, ry: 3.4,
      fill: '#16181f', stroke: '#2c3242', 'stroke-width': .7 }, parent);
  }

  /* стол переговорки + офисные стулья вокруг; seats = [N,E,S,W] */
  function meetingTable(parent, t) {
    var r = t.rect, s = t.seats || [0, 0, 0, 0], G = .62, i;
    for (i = 0; i < s[0]; i++)
      officeChair(parent, r.x + r.w * (i + 1) / (s[0] + 1), r.y - G, 's');
    for (i = 0; i < s[3]; i++)
      officeChair(parent, r.x - G, r.y + r.h * (i + 1) / (s[3] + 1), 'e');
    furnBox(parent, r, 13, BEIGE);
    for (i = 0; i < s[1]; i++)
      officeChair(parent, r.x + r.w + G, r.y + r.h * (i + 1) / (s[1] + 1), 'w');
    for (i = 0; i < s[2]; i++)
      officeChair(parent, r.x + r.w * (i + 1) / (s[2] + 1), r.y + r.h + G, 'n');
  }

  /* серое мягкое кресло; dir — куда «смотрит» */
  function armchair(parent, a) {
    var x = a.x, y = a.y;
    var seatR = { x: x - .42, y: y - .42, w: .84, h: .84 };
    var backR = {
      n: { x: x - .5, y: y + .28, w: 1, h: .3 },
      s: { x: x - .5, y: y - .58, w: 1, h: .3 },
      e: { x: x - .58, y: y - .5, w: .3, h: 1 },
      w: { x: x + .28, y: y - .5, w: .3, h: 1 }
    }[a.dir] || { x: x - .5, y: y - .58, w: 1, h: .3 };
    var vertical = a.dir === 'e' || a.dir === 'w';
    var armA = vertical
      ? { x: x - .5, y: y - .58, w: 1, h: .26 }
      : { x: x - .58, y: y - .5, w: .26, h: 1 };
    var armB = vertical
      ? { x: x - .5, y: y + .32, w: 1, h: .26 }
      : { x: x + .32, y: y - .5, w: .26, h: 1 };
    var sh = iso.project(x, y, S);
    el('ellipse', { cx: sh.x, cy: sh.y + 3, rx: 16, ry: 7.5, fill: 'rgba(0,0,0,.28)' }, parent);
    // painter: части дальше по x+y рисуем позже, чтобы правильно перекрывались
    var parts = [
      { r: backR, h: 20 }, { r: armA, h: 13 }, { r: armB, h: 13 }, { r: seatR, h: 8 }
    ];
    parts.sort(function (p1, p2) {
      return (p1.r.x + p1.r.w / 2 + p1.r.y + p1.r.h / 2) -
             (p2.r.x + p2.r.w / 2 + p2.r.y + p2.r.h / 2);
    });
    parts.forEach(function (p) { furnBox(parent, p.r, p.h, GREY); });
  }

  /* диван: спинка на севере, смотрит на юг */
  function buildSofa(parent, sf) {
    var r = sf.rect, c = iso.center(r, S);
    el('ellipse', { cx: c.x, cy: c.y + 3, rx: (r.w + r.h) * S * .33,
      ry: (r.w + r.h) * S * .15, fill: 'rgba(0,0,0,.28)' }, parent);
    furnBox(parent, { x: r.x, y: r.y - .28, w: r.w, h: .34 }, 19, GREY);
    furnBox(parent, { x: r.x - .26, y: r.y - .28, w: .3, h: r.h + .28 }, 13, GREY);
    furnBox(parent, { x: r.x + .06, y: r.y + .02, w: r.w - .12, h: r.h }, 9, GREY);
    furnBox(parent, { x: r.x + r.w - .04, y: r.y - .28, w: .3, h: r.h + .28 }, 13, GREY);
    for (var k = 1; k < 3; k++) {
      var q0 = iso.project(r.x + r.w * k / 3, r.y, S),
          q1 = iso.project(r.x + r.w * k / 3, r.y + r.h, S);
      el('line', { x1: q0.x, y1: q0.y - 9, x2: q1.x, y2: q1.y - 9,
        stroke: 'rgba(20,24,34,.35)', 'stroke-width': .8 }, parent);
    }
  }

  /* ТВ-панель у дальней стены комнаты (вдоль кромки y) */
  function tvPanel(parent, room, t) {
    var y = room.rect.y + .1;
    var A = iso.project(t.x0, y, S), B = iso.project(t.x1, y, S);
    var TOP = 34, BOT = 15;
    function P(t2, up) { return { x: A.x + (B.x - A.x) * t2, y: A.y + (B.y - A.y) * t2 - up }; }
    el('polygon', { points: iso.pts([P(0, TOP), P(1, TOP), P(1, BOT), P(0, BOT)]),
      fill: '#12151d', stroke: '#2c3242', 'stroke-width': 1 }, parent);
    el('polygon', { points: iso.pts([P(.05, TOP - 2), P(.95, TOP - 2), P(.95, BOT + 2), P(.05, BOT + 2)]),
      fill: '#24406b' }, parent);
    el('line', { x1: P(.15, TOP - 5).x, y1: P(.15, TOP - 5).y,
      x2: P(.45, TOP - 5).x, y2: P(.45, TOP - 5).y,
      stroke: 'rgba(255,255,255,.35)', 'stroke-width': 1.2 }, parent);
  }

  /* велотренажёр — пасхалка кабинета директора */
  function buildBike(parent, b) {
    var q = iso.project(b.x, b.y, S);
    el('ellipse', { cx: q.x, cy: q.y + 2, rx: 13, ry: 5, fill: 'rgba(0,0,0,.28)' }, parent);
    el('line', { x1: q.x - 10, y1: q.y, x2: q.x + 8, y2: q.y - 4,
      stroke: '#2c3242', 'stroke-width': 2.5 }, parent);
    el('circle', { cx: q.x - 6, cy: q.y - 8, r: 6, fill: '#1a1e2a',
      stroke: '#3a4152', 'stroke-width': 1.5 }, parent);
    el('circle', { cx: q.x - 6, cy: q.y - 8, r: 2, fill: '#3a4152' }, parent);
    el('line', { x1: q.x - 6, y1: q.y - 8, x2: q.x + 6, y2: q.y - 18,
      stroke: '#39415a', 'stroke-width': 2.5 }, parent);
    el('line', { x1: q.x - 6, y1: q.y - 8, x2: q.x - 9, y2: q.y - 21,
      stroke: '#39415a', 'stroke-width': 2.5 }, parent);
    el('line', { x1: q.x - 13, y1: q.y - 23, x2: q.x - 5, y2: q.y - 22,
      stroke: '#e0475a', 'stroke-width': 2.2, 'stroke-linecap': 'round' }, parent);
    el('ellipse', { cx: q.x + 6, cy: q.y - 19, rx: 3.5, ry: 1.6, fill: '#16181f' }, parent);
  }

  function buildInterior(g, r) {
    (r.interior || []).forEach(function (it) {
      if (it.kind === 'table') meetingTable(g, it);
      else if (it.kind === 'armchair') armchair(g, it);
      else if (it.kind === 'sofa') buildSofa(g, it);
      else if (it.kind === 'tv') tvPanel(g, r, it);
      else if (it.kind === 'bike') buildBike(g, it);
    });
  }

  function buildRoom(parent, r) {
    var p = iso.prism(r.rect, S, H);
    var c = iso.center(r.rect, S);
    var g = el('g', { 'class': 'room', id: 'room-' + r.id }, parent);
    g.addEventListener('click', function (e) {
      e.stopPropagation();
      if (consumeDrag()) return;
      openCard(r);
    });

    // аура ожидания и световое пятно на полу
    var rx = Math.max(60, (r.rect.w + r.rect.h) * S * .62);
    el('ellipse', { 'class': 'aura', cx: c.x, cy: c.y, rx: rx, ry: rx * .5,
      fill: 'url(#auraG)' }, g);
    el('ellipse', { 'class': 'glowpool', cx: c.x, cy: c.y + 6, rx: rx * .92, ry: rx * .46,
      fill: 'url(#pool)', filter: 'url(#soft)' }, g);

    // мебель внутри — до граней куба, чтобы просвечивала сквозь стекло
    buildInterior(g, r);

    // стеклянный куб
    el('polygon', { points: iso.pts(p.right), fill: shade(r.accent, .55),
      'fill-opacity': .5, stroke: r.accent, 'stroke-opacity': .5, 'stroke-width': 1 }, g);
    el('polygon', { points: iso.pts(p.front), fill: shade(r.accent, .72),
      'fill-opacity': .42, stroke: r.accent, 'stroke-opacity': .5, 'stroke-width': 1 }, g);
    buildDoor(g, r);
    el('polygon', { 'class': 'top', points: iso.pts(p.top), fill: r.accent,
      'fill-opacity': .26, stroke: r.accent, 'stroke-opacity': .95, 'stroke-width': 1.6 }, g);

    // подпись: большие — на крыше, маленькие будки — сбоку слева, остальные снизу
    var area = r.rect.w * r.rect.h;
    var isBig = area >= 40, isTiny = area < 8;
    var label = el('text', {
      x: isTiny ? c.x - r.rect.w * S * .55 - 8 : c.x,
      y: isBig ? c.y - H + 8 : (isTiny ? c.y - H * .35 : c.y + (r.rect.h * S * .5) + 26),
      'text-anchor': isTiny ? 'end' : 'middle', fill: '#eef0f6',
      'font-size': isBig ? 15 : 12.5, 'font-weight': 700,
      'paint-order': 'stroke', stroke: 'rgba(8,10,16,.8)', 'stroke-width': 3
    }, g);
    label.textContent = r.name;

    // чип статуса над крышей
    var chip = el('g', { 'class': 'chip', transform: 'translate(' + c.x + ',' + (c.y - H - 16) + ')' }, g);
    el('rect', { 'class': 'chip-bg', x: -46, y: -13, width: 92, height: 24, rx: 12,
      fill: '#1b2030', stroke: '#262b3d' }, chip);
    el('circle', { 'class': 'chip-dot', cx: -32, cy: -1, r: 4.2, fill: '#35c56d' }, chip);
    var ct = el('text', { 'class': 'chip-t', x: 7, y: 3.4, 'text-anchor': 'middle',
      'font-size': 11.5, 'font-weight': 650, 'font-family': 'ui-monospace,Menlo,monospace',
      fill: '#e8ebf5' }, chip);
    ct.textContent = '';
    updateRoom(r.id, true);
  }

  /* схематичная дверь: панель на видимой грани куба или коврик у скрытой */
  function buildDoor(g, r) {
    var d = r.door, rc = r.rect, DW = 0.95, hpx = H * 0.74;
    var onFront = Math.abs(d.y - (rc.y + rc.h)) < 0.1;
    var onRight = Math.abs(d.x - (rc.x + rc.w)) < 0.1;
    var A, B;
    if (onFront) {
      A = iso.project(Math.max(rc.x + 0.15, d.x - DW / 2), rc.y + rc.h, S);
      B = iso.project(Math.min(rc.x + rc.w - 0.15, d.x + DW / 2), rc.y + rc.h, S);
    } else if (onRight) {
      A = iso.project(rc.x + rc.w, Math.max(rc.y + 0.15, d.y - DW / 2), S);
      B = iso.project(rc.x + rc.w, Math.min(rc.y + rc.h - 0.15, d.y + DW / 2), S);
    } else {
      // дверь на скрытой грани — светлая метка на ребре крыши
      var onLeft = Math.abs(d.x - rc.x) < 0.1;
      var E0 = onLeft
        ? iso.project(rc.x, Math.max(rc.y + 0.15, d.y - DW / 2), S)
        : iso.project(Math.max(rc.x + 0.15, d.x - DW / 2), rc.y, S);
      var E1 = onLeft
        ? iso.project(rc.x, Math.min(rc.y + rc.h - 0.15, d.y + DW / 2), S)
        : iso.project(Math.min(rc.x + rc.w - 0.15, d.x + DW / 2), rc.y, S);
      el('line', { x1: E0.x, y1: E0.y - H, x2: E1.x, y2: E1.y - H,
        stroke: 'rgba(240,244,255,.95)', 'stroke-width': 4,
        'stroke-linecap': 'round' }, g);
      el('circle', { cx: (E0.x + E1.x) / 2, cy: (E0.y + E1.y) / 2 - H,
        r: 1.7, fill: '#0b0d13' }, g);
      return;
    }
    el('polygon', { points: iso.pts([
      { x: A.x, y: A.y - hpx }, { x: B.x, y: B.y - hpx }, B, A]),
      fill: 'rgba(10,12,18,.5)', stroke: 'rgba(240,244,255,.8)',
      'stroke-width': 1.2 }, g);
    el('circle', { cx: A.x + (B.x - A.x) * .78, cy: A.y + (B.y - A.y) * .78 - hpx * .45,
      r: 1.6, fill: '#e8ebf5' }, g);
  }

  function buildFun(parent, z) {
    if (z.id === 'tennis') return buildTennis(parent, z);
    if (z.id === 'football') return buildFoosball(parent, z);
    if (z.id === 'massage') return buildMassage(parent, z);
    var p = iso.prism(z.rect, S, FUN_H);
    var c = iso.center(z.rect, S);
    var g = el('g', { 'class': 'funzone', id: 'fun-' + z.id }, parent);
    g.addEventListener('click', function (e) {
      e.stopPropagation();
      if (consumeDrag()) return;
      openCard(z);
    });
    el('polygon', { points: iso.pts(p.right), fill: '#232939' }, g);
    el('polygon', { points: iso.pts(p.front), fill: '#1e2333' }, g);
    el('polygon', { points: iso.pts(p.top), fill: '#2a3147', stroke: '#3a4258',
      'stroke-width': 1 }, g);
    var em = el('text', { x: c.x, y: c.y - FUN_H + 6, 'text-anchor': 'middle',
      'font-size': 20 }, g);
    em.textContent = z.emoji;
    var t = el('text', { x: c.x, y: c.y - FUN_H + 24, 'text-anchor': 'middle',
      'font-size': 10.5, fill: '#8b93ab', 'font-weight': 650,
      'paint-order': 'stroke', stroke: 'rgba(8,10,16,.8)', 'stroke-width': 3 }, g);
    t.textContent = z.name;
  }

  /* ---------- живые статусы ---------- */

  function chipColor(status) {
    return status === 'occupied' ? 'var(--warm)' :
           status === 'awaiting' ? 'var(--amber)' : 'var(--free)';
  }

  function updateRoom(id, force) {
    var g = document.getElementById('room-' + id);
    if (!g) return;
    var st = engine.getState(id);
    g.setAttribute('class', 'room ' + st.status);
    g.querySelector('.top').setAttribute('fill-opacity',
      st.status === 'occupied' ? .48 : st.status === 'awaiting' ? .34 : .22);

    var dot = g.querySelector('.chip-dot');
    var txt = g.querySelector('.chip-t');
    var bg = g.querySelector('.chip-bg');
    if (st.status === 'awaiting') {
      var s = Math.max(0, Math.ceil(st.deadlineSec));
      txt.textContent = 'NFC ' + Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
      dot.setAttribute('fill', '#f5a623');
      bg.setAttribute('stroke', '#f5a623');
    } else if (st.status === 'occupied') {
      txt.textContent = 'до ' + fmt.time(st.current.end);
      dot.setAttribute('fill', '#ffb648');
      bg.setAttribute('stroke', '#262b3d');
    } else {
      txt.textContent = st.next ? 'до ' + fmt.time(st.next.start) : 'свободна';
      dot.setAttribute('fill', '#35c56d');
      bg.setAttribute('stroke', '#262b3d');
    }
  }

  function flashRoom(id) {
    var r = LO.ROOMS.find(function (x) { return x.id === id; });
    if (!r) return;
    var c = iso.center(r.rect, S);
    var world = document.getElementById('world');
    var ring = el('ellipse', { 'class': 'flash', cx: c.x, cy: c.y,
      rx: (r.rect.w + r.rect.h) * S * .5, ry: (r.rect.w + r.rect.h) * S * .25,
      fill: 'none', stroke: '#35c56d', 'stroke-width': 4,
      style: 'transform-box: fill-box; transform-origin: center' }, world);
    setTimeout(function () { ring.remove(); }, 1200);
  }

  /* ---------- пан/зум ---------- */

  function applyView() {
    svg.setAttribute('viewBox', view.x + ' ' + view.y + ' ' + view.w + ' ' + view.h);
  }
  var pointers = new Map();
  var pinch = null;
  var dragging = false;
  /* клик и пан различаем по порогу движения — захват указателя «съедал» клики */
  function consumeDrag() {
    if (dragging) { dragging = false; return true; }
    return false;
  }
  svg.addEventListener('pointerdown', function (e) {
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, sx: e.clientX, sy: e.clientY });
    if (pointers.size === 1) dragging = false;
    if (pointers.size === 2) {
      var ps = Array.from(pointers.values());
      pinch = { d: Math.hypot(ps[0].x - ps[1].x, ps[0].y - ps[1].y), w: view.w };
      dragging = true;
    }
  });
  svg.addEventListener('pointermove', function (e) {
    var pt = pointers.get(e.pointerId);
    if (!pt) return;
    if (!dragging && Math.hypot(e.clientX - pt.sx, e.clientY - pt.sy) > 6) dragging = true;
    var k = view.w / svg.clientWidth;
    if (pointers.size === 1 && dragging) {
      view.x -= (e.clientX - pt.x) * k;
      view.y -= (e.clientY - pt.y) * k;
      applyView();
    }
    pt.x = e.clientX; pt.y = e.clientY;
    if (pointers.size === 2 && pinch) {
      var ps = Array.from(pointers.values());
      var d = Math.hypot(ps[0].x - ps[1].x, ps[0].y - ps[1].y);
      if (d > 10) zoomAt((ps[0].x + ps[1].x) / 2, (ps[0].y + ps[1].y) / 2, pinch.w / view.w * (pinch.d / d));
    }
  });
  function endPointer(e) { pointers.delete(e.pointerId); pinch = null; }
  svg.addEventListener('pointerup', endPointer);
  svg.addEventListener('pointercancel', endPointer);
  svg.addEventListener('wheel', function (e) {
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, Math.exp(e.deltaY * 0.0016));
  }, { passive: false });
  function zoomAt(cx, cy, factor) {
    var newW = Math.min(6000, Math.max(500, view.w * factor));
    factor = newW / view.w;
    var mx = view.x + (cx / svg.clientWidth) * view.w;
    var my = view.y + (cy / svg.clientHeight) * view.h;
    view.w *= factor; view.h *= factor;
    view.x = mx - (cx / svg.clientWidth) * view.w;
    view.y = my - (cy / svg.clientHeight) * view.h;
    applyView();
  }
  svg.addEventListener('dblclick', function () { view = null; buildScene(); });

  /* ---------- карточка ---------- */

  var card = document.getElementById('card');
  var backdrop = document.getElementById('backdrop');
  var cardPlace = null;
  var cEls = {
    img: card.querySelector('.photo img'),
    photo: card.querySelector('.photo'),
    name: card.querySelector('.name'),
    chips: card.querySelector('.chips'),
    dot: card.querySelector('.dot'),
    stext: card.querySelector('.stext'),
    sub: card.querySelector('.sub'),
    badges: card.querySelector('.badges'),
    next: card.querySelector('.next'),
    tl: card.querySelector('.tl'),
    tlcap: card.querySelector('.tlcap'),
    summary: card.querySelector('.summary')
  };

  function openCard(place) {
    cardPlace = place;
    fillCard(true);
    card.classList.add('show');
    backdrop.classList.add('show');
  }
  function closeCard() {
    cardPlace = null;
    card.classList.remove('show');
    backdrop.classList.remove('show');
  }
  card.querySelector('.close').addEventListener('click', closeCard);
  backdrop.addEventListener('click', closeCard);
  svg.addEventListener('click', function () { if (consumeDrag()) return; closeCard(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeCard(); });

  function chip(text) {
    var s = document.createElement('span');
    s.className = 'c'; s.textContent = text;
    return s;
  }

  function fillCard(full) {
    var p = cardPlace;
    if (!p) return;
    var isRoom = !!p.cap;

    if (full) {
      cEls.name.textContent = (p.emoji ? p.emoji + ' ' : '') + p.name;
      cEls.img.onerror = function () {
        cEls.img.style.display = 'none';
        cEls.photo.style.background =
          'linear-gradient(135deg,' + (p.accent || '#39415c') + '55, #12151f)';
      };
      cEls.img.style.display = '';
      cEls.img.src = p.photo + '?v=2';  // версия против кэша браузера
      cEls.chips.textContent = '';
      if (isRoom) {
        cEls.chips.appendChild(chip('до ' + p.cap + ' чел'));
        p.features.forEach(function (fe) { cEls.chips.appendChild(chip(fe)); });
      } else {
        cEls.chips.appendChild(chip('фан-зона'));
        cEls.chips.appendChild(chip('без брони'));
      }
    }

    if (!isRoom) {
      cEls.dot.style.background = 'var(--free)';
      cEls.stext.textContent = 'Не бронируется';
      cEls.sub.textContent = p.note;
      cEls.badges.textContent = '';
      cEls.next.textContent = '';
      cEls.tl.style.display = 'none';
      cEls.tlcap.style.display = 'none';
      cEls.summary.textContent = 'Просто приходи, когда свободно 🙂';
      return;
    }
    cEls.tl.style.display = '';
    cEls.tlcap.style.display = '';

    var st = engine.getState(p.id);
    if (st.status === 'occupied') {
      cEls.dot.style.background = 'var(--warm)';
      cEls.stext.textContent = 'Идёт «' + st.current.title + '» · до ' + fmt.time(st.current.end);
      cEls.sub.textContent = st.current.organizer +
        (st.current.attendees.length > 1 ? ' и ещё ' + (st.current.attendees.length - 1) + ' чел' : '');
    } else if (st.status === 'awaiting') {
      var s = Math.max(0, Math.ceil(st.deadlineSec));
      cEls.dot.style.background = 'var(--amber)';
      cEls.stext.innerHTML = 'Бронь ждёт NFC · <span class="timer">' +
        Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0') + '</span>';
      cEls.sub.textContent = '«' + st.current.title + '» — если никто не отсканирует метку до ' +
        fmt.time(st.deadline) + ', комната освободится';
    } else {
      cEls.dot.style.background = 'var(--free)';
      cEls.stext.textContent = 'Свободна ещё ' + fmt.dur(st.freeUntil - engine.now());
      cEls.sub.textContent = 'Можно занять прямо сейчас';
    }

    cEls.badges.textContent = '';
    if (st.status === 'free' && st.releasedInfo) {
      var b = document.createElement('span');
      b.className = 'badge' + (st.releasedInfo.type === 'noshow' ? ' noshow' : '');
      b.textContent = st.releasedInfo.type === 'early'
        ? 'освободили на ' + st.releasedInfo.minutesEarly + ' мин раньше'
        : 'никто не пришёл — освобождена автоматически';
      cEls.badges.appendChild(b);
    }

    if (st.next) {
      cEls.next.innerHTML = '';
      cEls.next.appendChild(document.createTextNode('Дальше: '));
      var bb = document.createElement('b');
      bb.textContent = fmt.time(st.next.start) + ' — ' + st.next.title;
      cEls.next.appendChild(bb);
    } else {
      cEls.next.textContent = 'Дальше сегодня броней нет';
    }
    cEls.summary.textContent = st.summary;

    if (full) {
      cEls.tl.innerHTML = '<div class="now"></div>';
      var wd = engine.workday, span = wd.end - wd.start;
      st.schedule.forEach(function (e) {
        var d = document.createElement('div');
        d.className = 'ev' + (e.released ? ' ghost' :
          (st.current && e.id === st.current.id ? ' cur' :
          (e.end < engine.now() ? ' past' : '')));
        d.style.left = ((e.start - wd.start) / span * 100) + '%';
        d.style.width = Math.max(1.5, (e.end - e.start) / span * 100) + '%';
        d.title = fmt.time(e.start) + '–' + fmt.time(e.end) + ' ' + e.title;
        cEls.tl.appendChild(d);
      });
    }
    var nowEl = cEls.tl.querySelector('.now');
    if (nowEl) {
      var wd2 = engine.workday;
      nowEl.style.left = Math.min(100, Math.max(0,
        (engine.now() - wd2.start) / (wd2.end - wd2.start) * 100)) + '%';
    }
  }

  /* ---------- тост, счётчик, часы ---------- */

  var toast = document.getElementById('toast');
  var toastTimer = null;
  function showToast(title, text) {
    toast.querySelector('.tt').textContent = title;
    toast.querySelector('.tx').textContent = text;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 4200);
  }

  var savedEl = document.getElementById('saved');
  function renderSaved() {
    savedEl.textContent = '⚡ спасено сегодня ' + fmt.dur(engine.getSavedMinutes());
    savedEl.classList.add('bump');
    setTimeout(function () { savedEl.classList.remove('bump'); }, 250);
  }

  var clockEl = document.getElementById('clock');
  var lastSec = -1;

  /* ---------- подписки ---------- */

  engine.on('tick', function (t) {
    var s = Math.floor(t.simSec);
    if (s === lastSec) return;
    lastSec = s;
    clockEl.textContent = fmt.clock(t.simSec);
    LO.ROOMS.forEach(function (r) {
      var st = engine.getState(r.id);
      if (st.status === 'awaiting') updateRoom(r.id);
    });
    if (card.classList.contains('show')) fillCard(false);
  });

  engine.on('change', function (e) {
    updateRoom(e.roomId, true);
    if (e.prev === 'awaiting' && e.state.status === 'free') flashRoom(e.roomId);
    if (card.classList.contains('show') && cardPlace && cardPlace.id === e.roomId) fillCard(true);
  });
  engine.on('minute', function () {
    LO.ROOMS.forEach(function (r) { updateRoom(r.id); });
  });
  engine.on('toast', function (t) { showToast(t.title, t.text); });
  engine.on('saved', renderSaved);
  engine.on('reset', function () {
    buildScene(); renderSaved(); closeCard();
  });

  /* ---------- переключалка этажей ---------- */

  var floorsBox = document.getElementById('floors');
  var floorLabel = document.getElementById('floorlabel');
  LO.FLOORS.forEach(function (fl) {
    var b = document.createElement('button');
    b.textContent = fl.num;
    b.id = 'floorbtn-' + fl.num;
    if (fl.num === activeFloor) b.className = 'on';
    b.addEventListener('click', function () { setFloor(fl.num); });
    floorsBox.appendChild(b);
  });

  function setFloor(num) {
    if (num === activeFloor) return;
    var old = activeFloor;
    activeFloor = num;
    // без пересборки: меняем классы, активный этаж наверх стопки
    var gNew = document.getElementById('floorg-' + num);
    var gOld = document.getElementById('floorg-' + old);
    if (gNew && gOld) {
      gOld.setAttribute('class', 'floorg ghost');
      gNew.setAttribute('class', 'floorg');
      gNew.parentNode.appendChild(gNew);
    }
    // камера едет к активному этажу
    view.y += floorOffset(num) - floorOffset(old);
    applyView();
    LO.FLOORS.forEach(function (fl) {
      var b = document.getElementById('floorbtn-' + fl.num);
      if (b) b.className = fl.num === num ? 'on' : '';
    });
    floorLabel.textContent = num + ' этаж';
  }

  /* ---------- старт ---------- */

  buildScene();
  renderSaved();
})();
/*APP-END*/
</script>
